name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: crdt-node-linux-x86_64
            binary: target/release/crdt-app
          - os: macos-latest
            artifact: crdt-node-macos-arm64
            binary: target/release/crdt-app
          - os: macos-13
            artifact: crdt-node-macos-x86_64
            binary: target/release/crdt-app
          - os: windows-latest
            artifact: crdt-node-windows-x86_64.exe
            binary: target/release/crdt-app.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: cargo build --release -p crdt-app

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item ${{ matrix.binary }} ${{ matrix.artifact }}
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
