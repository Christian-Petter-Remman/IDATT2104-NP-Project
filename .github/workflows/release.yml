name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: crdt-node-linux-x86_64
            binary: target/release/crdt-app
          - os: macos-latest
            artifact: crdt-node-macos-arm64
            binary: target/release/crdt-app
          - os: windows-latest
            artifact: crdt-node-windows-x86_64.exe
            binary: target/release/crdt-app.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: cargo build --release -p crdt-app

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item ${{ matrix.binary }} ${{ matrix.artifact }}
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: ${{ matrix.artifact }}
